name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        xcode: ["26.4"]
        os:
          - macOS
          - iOS
          - visionOS
        machine: ["macOS-26"]
        test_only: ["no"]
        include:
          - xcode: "26.4"
            os: iOS
            machine: macOS-26
            test_only: "yes"
    runs-on: ${{ matrix.machine }}
    steps:
    - uses: actions/checkout@v1
    - name: Select Xcode
      run: sudo xcode-select --switch /Applications/Xcode_${{ matrix.xcode }}.app
    - uses: ./.github/actions/prepare
      with:
        target-os: ${{ matrix.os }}
    - name: Build (iOS/visionOS)
      if: matrix.os != 'macOS' && matrix.test_only == 'no'
      run: set -o pipefail && xcodebuild clean build -workspace iMast.xcworkspace -scheme "iMast iOS" -destination "generic/platform=${{ matrix.os }}" CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" | xcpretty -c
    - name: Build (macOS)
      if: matrix.os == 'macOS'
      run: set -o pipefail && xcodebuild clean build -workspace iMast.xcworkspace -scheme "iMast Mac (App Store)" CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" | xcpretty -c
    - name: Test (iOS)
      if: matrix.os == 'iOS' && matrix.test_only == 'yes'
      run: |
        echo "::group::Setup mock server"
        pushd mock_server
        corepack enable
        pnpm install --frozen-lockfile
        popd
        echo "::endgroup::"
        defaults write com.apple.dt.Xcode IDEPackageEnablePrebuilts -bool true
        python3 .github/test_on_multiple_devices.py
    - name: Upload Test Results
      if: matrix.os == 'iOS' && matrix.test_only == 'yes' && always()
      uses: actions/upload-artifact@v7
      with:
        name: test-results_${{ matrix.os }}_Xcode.${{ matrix.xcode }}
        path: test_results