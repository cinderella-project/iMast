name: CI

on: [push]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        xcode: ["26.4"]
        os:
          - macOS
          - iOS
          - visionOS
        machine: ["macOS-26"]
    runs-on: ${{ matrix.machine }}
    steps:
    - uses: actions/checkout@v1
    - name: Select Xcode
      run: sudo xcode-select --switch /Applications/Xcode_${{ matrix.xcode }}.app
    - name: bundle install
      run: bundle update --bundler && bundle install
    - name: Install CocoaPods dependencies
      run: bundle exec pod install
    - run: git config --global core.quotepath false # for Ikemen on SwiftPM
    - name: Download Platform
      run: |
        for i in $(seq 1 3); do
          xcodebuild -downloadPlatform ${{ matrix.os }} && break
        done
      if: matrix.os != 'macOS'
    - name: Build (iOS/visionOS)
      if: matrix.os != 'macOS'
      run: set -o pipefail && xcodebuild clean build -workspace iMast.xcworkspace -scheme "iMast iOS" -destination "generic/platform=${{ matrix.os }}" CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" | xcpretty -c
    - name: Build (macOS)
      if: matrix.os == 'macOS'
      run: set -o pipefail && xcodebuild clean build -workspace iMast.xcworkspace -scheme "iMast Mac (App Store)" CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" | xcpretty -c
